<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Génesis Odyssey: Simulador Médico Pro</title>
    <style>
        :root { --blue: #00d2ff; --pink: #ff007f; --gold: #ffcc00; --bg: #03030b; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', sans-serif; color: white; }
        canvas { display: block; }

        /* UI Dinámica */
        #ui { position: absolute; inset: 0; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 30px; }
        #hud { background: rgba(0,0,0,0.8); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); width: 350px; pointer-events: auto; backdrop-filter: blur(10px); }
        #phase-title { font-size: 1.5rem; font-weight: 800; color: var(--blue); text-transform: uppercase; margin: 0; }
        #instr { font-size: 0.95rem; color: #ccc; margin-top: 10px; line-height: 1.4; }
        
        #day-label { font-size: 2rem; font-weight: bold; color: var(--gold); position: absolute; top: 30px; right: 30px; }

        #controls { display: none; gap: 15px; pointer-events: auto; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 50px; align-self: center; margin-bottom: 20px; border: 1px solid var(--blue); }
        .dot-btn { width: 50px; height: 50px; border-radius: 50%; border: none; cursor: pointer; transition: 0.3s; position: relative; }
        .dot-btn::after { content: attr(data-label); position: absolute; top: -30px; left: 50%; transform: translateX(-50%); font-size: 10px; white-space: nowrap; color: white; opacity: 0; transition: 0.3s; }
        .dot-btn:hover::after { opacity: 1; }
        .active { transform: scale(1.2); box-shadow: 0 0 20px white; }

        /* Pantallas de Transición */
        #overlay { position: absolute; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; transition: 1s; opacity: 0; pointer-events: none; }
        #overlay.show { opacity: 1; pointer-events: auto; }
        .msg-box { text-align: center; max-width: 500px; }
        h2 { font-size: 3rem; margin: 0; color: var(--blue); }
        
        #victory { display: none; flex-direction: column; align-items: center; background: rgba(0,0,0,0.95); padding: 50px; border-radius: 30px; border: 2px solid var(--gold); }
    </style>
</head>
<body>

<div id="overlay"><div class="msg-box"><h2 id="msg-text">FECUNDACIÓN...</h2></div></div>

<div id="ui">
    <div id="hud">
        <h1 id="phase-title">Cargando...</h1>
        <p id="instr"></p>
    </div>
    <div id="day-label">Día 1</div>
    <div id="controls">
        <button class="dot-btn" data-label="Ectodermo" style="background: #0af;" onclick="setL('ecto', this)"></button>
        <button class="dot-btn" data-label="Mesodermo" style="background: #f44;" onclick="setL('meso', this)"></button>
        <button class="dot-btn" data-label="Endodermo" style="background: #fa4;" onclick="setL('endo', this)"></button>
    </div>
</div>

<div id="overlay-win" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:200; align-items:center; justify-content:center;">
    <div id="victory" style="display:flex;">
        <h2>¡ÉXITO TOTAL!</h2>
        <p>Has completado el desarrollo embrionario temprano.</p>
        <button onclick="location.reload()" style="padding:15px 40px; background:var(--blue); border:none; color:white; font-weight:bold; cursor:pointer; border-radius:10px;">REINICIAR</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
const { Engine, Render, Composite, Body, Bodies, Events, Vector, Mouse, MouseConstraint, Query } = Matter;

const engine = Engine.create();
engine.world.gravity.scale = 0;

const canvas = document.createElement('canvas');
document.body.appendChild(canvas);
const ctx = canvas.getContext('2d');
let w = window.innerWidth, h = window.innerHeight;
canvas.width = w; canvas.height = h;

let state = 'START';
let days = 1;
let player, egg, particles = [], cells = [], obs = [], endoWall, mConstraint;
let activeL = null;
let mousePos = { x: 0, y: 0 };
let counts = { ecto: 0, meso: 0, endo: 0 };

// --- GESTIÓN DE ESTADOS ---

function transition(newState, msg) {
    const ov = document.getElementById('overlay');
    const txt = document.getElementById('msg-text');
    txt.innerText = msg;
    ov.classList.add('show');
    
    setTimeout(() => {
        state = newState;
        setupState();
        ov.classList.remove('show');
    }, 1500);
}

function setupState() {
    Composite.clear(engine.world);
    cells = []; obs = []; player = null; egg = null; endoWall = null;
    if(mConstraint) Composite.remove(engine.world, mConstraint);

    const hud = document.getElementById('phase-title');
    const instr = document.getElementById('instr');

    switch(state) {
        case 'FERT':
            hud.innerText = "Fase 1: Fecundación";
            instr.innerText = "Guía al espermatozoide hacia el óvulo. Esquiva los anticuerpos y penetra la zona pelúcida.";
            egg = Bodies.circle(w * 0.8, h/2, 100, { isStatic: true, isSensor: true, label: 'egg' });
            player = Bodies.circle(100, h/2, 10, { label: 'sperm', frictionAir: 0.1 });
            for(let i=0; i<30; i++) {
                let o = Bodies.circle(w*0.3 + Math.random()*w*0.4, Math.random()*h, 15+Math.random()*20, { restitution: 1, frictionAir: 0, label: 'obs' });
                Body.setVelocity(o, {x: (Math.random()-0.5)*6, y: (Math.random()-0.5)*6});
                obs.push(o);
            }
            Composite.add(engine.world, [egg, player, ...obs]);
            break;

        case 'MITOSIS':
            days = 2;
            hud.innerText = "Fase 2: Segmentación";
            instr.innerText = "El cigoto se divide. Haz CLIC repetidamente para avanzar de 2 a 16 células (Mórula).";
            spawnCell(w/2, h/2, 60);
            break;

        case 'IMPLANT':
            days = 6;
            hud.innerText = "Fase 3: Implantación";
            instr.innerText = "Arrastra el Blastocisto hacia el Endometrio (derecha) para iniciar la invasión.";
            endoWall = Bodies.rectangle(w - 60, h/2, 120, h, { isStatic: true, label: 'wall' });
            Composite.add(engine.world, endoWall);
            const m = Mouse.create(canvas);
            mConstraint = MouseConstraint.create(engine, { mouse: m, constraint: { stiffness: 0.1, render: { visible: false } } });
            Composite.add(engine.world, mConstraint);
            break;

        case 'GASTRULA':
            days = 14;
            hud.innerText = "Fase 4: Gastrulación";
            instr.innerText = "Diferenciación celular. Elige una capa y colorea las células. ¡Define el destino del embrión!";
            document.getElementById('controls').style.display = 'flex';
            cells.forEach(c => Body.setStatic(c, true));
            break;
    }
}

function spawnCell(x, y, r) {
    let c = Bodies.circle(x, y, r, { restitution: 0.5, frictionAir: 0.08, label: 'cell' });
    cells.push(c);
    Composite.add(engine.world, c);
}

function setL(l, btn) {
    activeL = l === 'ecto' ? '#0af' : l === 'meso' ? '#f44' : '#fa4';
    document.querySelectorAll('.dot-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

// --- LOOP & INPUT ---

window.addEventListener('mousemove', e => { mousePos = { x: e.clientX, y: e.clientY }; });

window.addEventListener('mousedown', () => {
    if(state === 'MITOSIS' && cells.length < 16) {
        let current = [...cells];
        let r = current[0].circleRadius * 0.8;
        current.forEach(c => {
            let p = c.position;
            Composite.remove(engine.world, c);
            spawnCell(p.x - 12, p.y, r); spawnCell(p.x + 12, p.y, r);
        });
        cells = cells.filter(c => !current.includes(c));
        days++;
        if(cells.length >= 16) setTimeout(() => transition('IMPLANT', 'BLASTOCISTO FORMADO'), 1000);
    }
    if(state === 'GASTRULA' && activeL) {
        let hits = Query.point(cells, mousePos);
        if(hits.length > 0) {
            let c = hits[0];
            if(!c.color) {
                c.color = activeL;
                if(activeL === '#0af') counts.ecto++;
                if(activeL === '#f44') counts.meso++;
                if(activeL === '#fa4') counts.endo++;
                if(counts.ecto > 3 && counts.meso > 3 && counts.endo > 3) {
                    document.getElementById('overlay-win').style.display = 'flex';
                }
            }
        }
    }
});

Events.on(engine, 'collisionStart', (e) => {
    e.pairs.forEach(p => {
        if(state === 'FERT' && (p.bodyA.label === 'sperm' || p.bodyB.label === 'sperm')) {
            if(p.bodyA.label === 'egg' || p.bodyB.label === 'egg') transition('MITOSIS', '¡FECUNDACIÓN EXITOSA!');
        }
        if(state === 'IMPLANT' && (p.bodyA.label === 'cell' || p.bodyB.label === 'cell')) {
            if(p.bodyA.label === 'wall' || p.bodyB.label === 'wall') transition('GASTRULA', 'GASTRULACIÓN');
        }
    });
});

function draw() {
    ctx.fillStyle = '#03030b';
    ctx.fillRect(0, 0, w, h);

    if(state === 'FERT' && player) {
        let force = Vector.mult(Vector.normalise(Vector.sub(mousePos, player.position)), 0.0008);
        Body.applyForce(player, player.position, force);
        // Dibujar Sperm
        ctx.fillStyle = "white";
        ctx.beginPath(); ctx.arc(player.position.x, player.position.y, 8, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.strokeStyle = "white"; ctx.lineWidth = 2;
        ctx.moveTo(player.position.x, player.position.y);
        ctx.lineTo(player.position.x - player.velocity.x*15, player.position.y - player.velocity.y*15);
        ctx.stroke();
    }

    if(egg && state === 'FERT') {
        ctx.beginPath(); ctx.arc(egg.position.x, egg.position.y, 100, 0, Math.PI*2);
        let g = ctx.createRadialGradient(egg.position.x, egg.position.y, 0, egg.position.x, egg.position.y, 100);
        g.addColorStop(0, '#f09'); g.addColorStop(1, '#402');
        ctx.fillStyle = g; ctx.fill();
        ctx.strokeStyle = '#f09'; ctx.lineWidth = 5; ctx.stroke();
    }

    obs.forEach(o => {
        ctx.fillStyle = '#234';
        ctx.beginPath(); ctx.arc(o.position.x, o.position.y, o.circleRadius, 0, Math.PI*2); ctx.fill();
        if(o.position.x < 0 || o.position.x > w) Body.setVelocity(o, {x: -o.velocity.x, y: o.velocity.y});
        if(o.position.y < 0 || o.position.y > h) Body.setVelocity(o, {x: o.velocity.x, y: -o.velocity.y});
    });

    if(state >= 3 && endoWall) {
        ctx.fillStyle = '#411';
        ctx.fillRect(w-120, 0, 120, h);
    }

    cells.forEach(c => {
        ctx.beginPath(); ctx.arc(c.position.x, c.position.y, c.circleRadius, 0, Math.PI*2);
        let grad = ctx.createRadialGradient(c.position.x, c.position.y, 0, c.position.x, c.position.y, c.circleRadius);
        grad.addColorStop(0, c.color || '#89a'); grad.addColorStop(1, '#1a2b4c');
        ctx.fillStyle = grad; ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.stroke();
    });

    document.getElementById('day-label').innerText = `Día ${Math.floor(days)}`;
    Engine.update(engine, 16);
    requestAnimationFrame(draw);
}

window.addEventListener('resize', () => { w = window.innerWidth; h = window.innerHeight; canvas.width = w; canvas.height = h; });

transition('FERT', 'GENESIS ODYSSEY');
draw();
</script>
</body>
</html>
